<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Friend 💖</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            color: #ff4d4d;
            background-color: currentColor;
            transform: rotate(-45deg);
            animation: float 5s infinite ease-in;
            opacity: 0.6;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: currentColor;
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 10px;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(-45deg) scale(0.5);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100px) rotate(-45deg) scale(1.5);
                opacity: 0;
            }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px) rotate(-5deg);
            }

            50% {
                transform: translateX(5px) rotate(5deg);
            }

            75% {
                transform: translateX(-5px) rotate(-5deg);
            }

            100% {
                transform: translateX(0);
            }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(255, 77, 77, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0);
            }
        }

        #no-btn {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 50;
        }

        #yes-btn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        /* Container transitions */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative">

    <!-- Ambient floating hearts -->
    <div id="hearts-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <!-- Main Content Card -->
    <div id="main-card"
        class="bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[2rem] shadow-2xl z-10 max-w-[90%] w-full sm:max-w-md mx-4 text-center border border-white/60 transition-all duration-500 overflow-visible relative">

        <!-- Question Section -->
        <div id="question-container" class="flex flex-col items-center">

            <!-- Graphic element -->
            <div class="mb-6 flex justify-center">
                <div class="text-7xl animate-bounce drop-shadow-md">💌</div>
            </div>

            <!-- Heading -->
            <h1 id="heading"
                class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-600 mb-10"
                style="font-family: 'Outfit', sans-serif;">
                Will you be my Friend? 💖
            </h1>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 relative min-h-[120px] w-full">
                <button id="yes-btn"
                    class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-4 px-10 rounded-full shadow-xl hover:shadow-2xl flex items-center gap-2 text-xl pulse whitespace-nowrap">
                    <span>✅</span> Yes
                </button>

                <button id="no-btn"
                    class="bg-gray-100/90 hover:bg-gray-200 text-gray-600 font-semibold py-4 px-10 rounded-full shadow-md hover:shadow-lg flex items-center gap-2 text-lg whitespace-nowrap backdrop-blur-sm border border-gray-200/50">
                    <span>❌</span> No
                </button>
            </div>
        </div>

        <!-- Success Message Section -->
        <div id="success-container" class="hidden flex-col items-center justify-center h-full fade-in py-4">
            <img src="monkey.png" alt="Funny Monkey"
                class="w-48 h-48 md:w-64 md:h-64 object-cover rounded-3xl shadow-2xl mb-8 pulse border-4 border-pink-300 drop-shadow-xl"
                style="animation-duration: 2s;">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-600 mb-6 leading-tight"
                style="font-family: 'Outfit', sans-serif;">
                As of, I expected you too are a monkey, right? 💕
            </h1>
            <div class="bg-pink-100/50 backdrop-blur-sm rounded-xl p-4 inline-block shadow-sm">
                <p class="text-pink-600 font-semibold text-lg">Yaaaaaaay! ✨</p>
            </div>
        </div>
    </div>

    <!-- Music toggle (Bonus) -->
    <button id="music-toggle"
        class="fixed bottom-4 right-4 z-50 bg-white/60 hover:bg-white/90 backdrop-blur-sm p-3 rounded-full shadow-lg transition-colors text-xl"
        title="Toggle sound">
        🔇
    </button>

    <script src="be-my-friend.js"></script>
</body>

</html>
